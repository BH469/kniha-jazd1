<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kniha Jázd PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #0f172a; }
        .active-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="text-white font-sans min-h-screen p-4 pb-10">

    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-blue-400 tracking-tight">🚗 Kniha Jázd</h1>
            <span id="statusBadge" class="text-[10px] bg-slate-800 border border-slate-700 px-3 py-1 rounded-full uppercase font-bold text-slate-400">Pripravený</span>
        </div>

        <!-- Displej -->
        <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-8 rounded-[2.5rem] shadow-2xl border border-slate-700 text-center mb-6 relative overflow-hidden">
            <div id="timer" class="text-lg font-mono text-blue-400/70 mb-1">00:00:00</div>
            <div id="distance" class="text-8xl font-black text-white leading-none tracking-tighter">0.0</div>
            <div class="text-slate-500 mt-2 uppercase tracking-[0.3em] text-[10px] font-bold">Kilometre</div>
            
            <div id="locationDisplay" class="mt-6 p-3 bg-black/20 rounded-2xl text-[11px] text-slate-300 italic min-h-[40px] flex items-center justify-center text-center">
               📍 Čakám na štart...
            </div>
        </div>

        <div class="grid grid-cols-1 gap-4 mb-8">
            <button id="startBtn" onclick="startTrip()" class="bg-blue-600 hover:bg-blue-500 py-6 rounded-[1.5rem] font-black text-xl shadow-lg active:scale-95 transition-all">▶ ZAČAŤ JAZDU</button>
            <button id="stopBtn" onclick="stopTrip()" class="hidden bg-red-600 hover:bg-red-500 py-6 rounded-[1.5rem] font-black text-xl shadow-lg active:scale-95 transition-all active-pulse">🛑 KONIEC JAZDY</button>
        </div>

        <!-- Nastavenia pre export -->
        <div class="bg-slate-800/50 p-4 rounded-2xl mb-6 border border-slate-700 text-xs">
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="avgConsumption" value="6.5" step="0.1" class="bg-slate-900 p-2 rounded-lg text-white outline-none" placeholder="Spotreba">
                <input type="number" id="fuelPrice" value="1.62" step="0.01" class="bg-slate-900 p-2 rounded-lg text-white outline-none" placeholder="Cena PHM">
            </div>
        </div>

        <div class="flex gap-3 mb-10 text-[10px]">
            <button onclick="exportToCSV()" class="flex-1 bg-slate-700 py-3 rounded-xl font-bold uppercase tracking-widest">📥 Export CSV</button>
            <button onclick="clearLogs()" class="bg-slate-800 py-3 px-6 rounded-xl text-red-500 font-bold uppercase">Zmazať</button>
        </div>

        <div id="historyList" class="space-y-3"></div>
    </div>

    <script>
        let watchId = null, startTime = null, timerInterval = null, totalDistance = 0, lastCoords = null;
        let tripHistory = JSON.parse(localStorage.getItem('tripHistory')) || [];

        // --- OPRAVENÁ FUNKCIA PRE IPHONE ---
        async function fetchCity(lat, lon) {
            try {
                // Skúsime Nominatim s dlhším timeoutom a slovenskou lokalizáciou
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000); // 5 sekúnd timeout

                const url = `https://nominatim.openstreetmap.org{lat}&lon=${lon}&zoom=14&addressdetails=1&accept-language=sk`;
                
                const res = await fetch(url, { 
                    signal: controller.signal,
                    headers: { 'User-Agent': 'KnihaJazd_Mobile_App_' + Date.now() }
                });
                
                const data = await res.json();
                clearTimeout(timeoutId);

                if (data && data.address) {
                    const a = data.address;
                    // Vrátime mesto, obec alebo ulicu
                    const city = a.city || a.town || a.village || a.municipality || a.hamlet || a.suburb;
                    const road = a.road || "";
                    if (city) return road ? `${road}, ${city}` : city;
                }
                return `Pozícia: ${lat.toFixed(3)}, ${lon.toFixed(3)}`;
            } catch (e) {
                console.log("Internet/API error", e);
                return `Súradnice: ${lat.toFixed(3)}, ${lon.toFixed(3)}`;
            }
        }

        function updateTimer() {
            const diff = new Date(new Date() - startTime);
            document.getElementById('timer').innerText = diff.toISOString().substr(11, 8);
        }

        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function startTrip() {
            if (!navigator.geolocation) return alert("Zapnite si GPS.");
            
            startTime = new Date();
            totalDistance = 0; lastCoords = null;
            document.getElementById('distance').innerText = "0.0";
            document.getElementById('locationDisplay').innerText = "📍 Hľadám názov miesta...";
            
            toggleUI(true);
            timerInterval = setInterval(updateTimer, 1000);

            navigator.geolocation.getCurrentPosition(async p => {
                const city = await fetchCity(p.coords.latitude, p.coords.longitude);
                document.getElementById('locationDisplay').innerText = "Odchod: " + city;
                window.currentStartAddr = city; // Uložíme si pre históriu
            }, (err) => {
                document.getElementById('locationDisplay').innerText = "📍 Povolenie GPS zamietnuté.";
            }, { enableHighAccuracy: true });

            watchId = navigator.geolocation.watchPosition(p => {
                if (lastCoords) {
                    const d = getDist(lastCoords.lat, lastCoords.lon, p.coords.latitude, p.coords.longitude);
                    if (d > 0.01) { totalDistance += d; document.getElementById('distance').innerText = totalDistance.toFixed(2); }
                }
                lastCoords = { lat: p.coords.latitude, lon: p.coords.longitude };
            }, null, { enableHighAccuracy: true });
        }

        async function stopTrip() {
            clearInterval(timerInterval);
            navigator.geolocation.clearWatch(watchId);
            
            let endCity = "Neznáme";
            if (lastCoords) {
                document.getElementById('locationDisplay').innerText = "📍 Hľadám cieľ...";
                endCity = await fetchCity(lastCoords.lat, lastCoords.lon);
            }

            const consumption = parseFloat(document.getElementById('avgConsumption').value) || 6.5;
            const price = parseFloat(document.getElementById('fuelPrice').value) || 1.62;
            const cost = (totalDistance * (consumption / 100) * price).toFixed(2);

            tripHistory.push({
                date: new Date().toLocaleString('sk-SK'),
                from: window.currentStartAddr || "Neznáme",
                to: endCity,
                km: totalDistance.toFixed(2),
                time: document.getElementById('timer').innerText,
                cost: cost
            });

            localStorage.setItem('tripHistory', JSON.stringify(tripHistory));
            renderHistory();
            toggleUI(false);
            document.getElementById('locationDisplay').innerText = "Cieľ: " + endCity;
        }

        function toggleUI(on) {
            document.getElementById('startBtn').classList.toggle('hidden', on);
            document.getElementById('stopBtn').classList.toggle('hidden', !on);
            document.getElementById('statusBadge').innerText = on ? "V pohybe" : "Pripravený";
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            container.innerHTML = "";
            tripHistory.slice().reverse().slice(0, 10).forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-slate-800/40 p-3 rounded-xl border border-slate-700/50 text-[10px] mb-2";
                div.innerHTML = `<b>${item.date}</b> | ${item.km} km | ${item.cost} €<br><span class="opacity-60">Z: ${item.from}<br>Do: ${item.to}</span>`;
                container.appendChild(div);
            });
        }
        function exportToCSV() {
            let csv = "Datum;Z;Do;km;Cas;Cena\n";
            tripHistory.forEach(r => csv += `"${r.date}";"${r.from}";"${r.to}";${r.km};${r.time};${r.cost}\n`);
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `kniha_jazd.csv`;
            link.click();
        }
        function clearLogs() { if(confirm("Zmazať?")) { tripHistory = []; localStorage.removeItem('tripHistory'); renderHistory(); } }
        renderHistory();
    </script>
</body>
</html>
