<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kniha Jázd PRO v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #0f172a; }
        .active-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="text-white font-sans min-h-screen p-4 pb-10">

    <div class="max-w-md mx-auto">
        <!-- Hlavička -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-blue-400 tracking-tight">🚗 Kniha Jázd</h1>
            <span id="statusBadge" class="text-[10px] bg-slate-800 border border-slate-700 px-3 py-1 rounded-full uppercase font-bold text-slate-400">Pripravený</span>
        </div>

        <!-- Nastavenia Vozidla -->
        <div class="bg-slate-800/50 p-4 rounded-2xl mb-4 border border-slate-700 backdrop-blur-sm shadow-xl">
            <h2 class="text-[10px] font-bold text-slate-500 mb-3 uppercase tracking-widest">Nastavenia & Tankovanie</h2>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[9px] text-slate-400 uppercase ml-1">Spotreba (l/100km)</label>
                    <input type="number" id="avgConsumption" value="6.5" step="0.1" class="w-full bg-slate-900 border-none rounded-xl p-3 text-white outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[9px] text-slate-400 uppercase ml-1">Cena PHM (€/l)</label>
                    <input type="number" id="fuelPrice" value="1.62" step="0.01" class="w-full bg-slate-900 border-none rounded-xl p-3 text-white outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[9px] text-slate-400 uppercase ml-1">Tachometer (km)</label>
                    <input type="number" id="odo" placeholder="125000" class="w-full bg-slate-900 border-none rounded-xl p-3 text-white outline-none">
                </div>
                <div>
                    <label class="text-[9px] text-orange-400 uppercase ml-1 font-bold">Natankované (l)</label>
                    <input type="number" id="refuelLiters" placeholder="0" class="w-full bg-slate-900 border-none rounded-xl p-3 text-orange-400 outline-none">
                </div>
            </div>
        </div>

        <!-- Hlavný displej -->
        <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-8 rounded-[2.5rem] shadow-2xl border border-slate-700 text-center mb-6 relative overflow-hidden">
            <div id="timer" class="text-lg font-mono text-blue-400/70 mb-1">00:00:00</div>
            <div id="distance" class="text-8xl font-black text-white leading-none tracking-tighter">0.0</div>
            <div class="text-slate-500 mt-2 uppercase tracking-[0.3em] text-[10px] font-bold">Kilometre</div>
            
            <div id="locationDisplay" class="mt-6 p-3 bg-black/20 rounded-2xl text-[11px] text-slate-400 italic min-h-[40px] flex items-center justify-center">
               📍 Čakám na štart...
            </div>
        </div>

        <!-- Ovládacie tlačidlá -->
        <div class="grid grid-cols-1 gap-4 mb-8">
            <button id="startBtn" onclick="startTrip()" class="bg-blue-600 hover:bg-blue-500 py-6 rounded-[1.5rem] font-black text-xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3">
                <span class="text-2xl">▶</span> ZAČAŤ JAZDU
            </button>
            <button id="stopBtn" onclick="stopTrip()" class="hidden bg-red-600 hover:bg-red-500 py-6 rounded-[1.5rem] font-black text-xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3 active-pulse">
                <span class="text-2xl">🛑</span> KONIEC JAZDY
            </button>
        </div>

        <!-- Akcie a História -->
        <div class="flex gap-3 mb-10">
            <button onclick="exportToCSV()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-4 rounded-2xl text-xs font-bold uppercase tracking-wider transition-colors font-bold">📥 Export CSV</button>
            <button onclick="clearLogs()" class="bg-slate-800 hover:bg-red-900/40 border border-slate-700 py-4 px-6 rounded-2xl text-xs text-red-500 transition-colors font-bold uppercase">Zmazať</button>
        </div>

        <div id="historyList" class="space-y-3">
            <h3 class="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] mb-4 px-1">Posledné jazdy</h3>
        </div>
    </div>

    <script>
        let watchId = null, startTime = null, timerInterval = null;
        let totalDistance = 0, lastCoords = null;
        let startAddr = "Neznáme", endAddr = "Neznáme";
        let tripHistory = JSON.parse(localStorage.getItem('tripHistory')) || [];

        // --- VYLEPŠENÁ FUNKCIA PRE PREKLAD GPS NA ADRESU ---
        async function fetchCity(lat, lon) {
            try {
                // Pridanie náhodného parametra zabráni iPhonu použiť starú cache
                const url = `https://nominatim.openstreetmap.org{lat}&lon=${lon}&zoom=16&addressdetails=1&cb=${Date.now()}`;
                
                const res = await fetch(url, {
                    headers: { 
                        'Accept-Language': 'sk-SK,sk;q=0.9',
                        'User-Agent': 'KnihaJazd_v3_iPhone'
                    }
                });
                
                const data = await res.json();
                
                if (data && data.address) {
                    const a = data.address;
                    // Hľadáme najlepší názov miesta
                    const mesto = a.city || a.town || a.village || a.municipality || a.hamlet || a.suburb || "";
                    const ulica = a.road || "";
                    
                    if (ulica || mesto) {
                        return ulica && mesto ? `${ulica}, ${mesto}` : (ulica || mesto);
                    }
                }
                return `${lat.toFixed(3)}, ${lon.toFixed(3)}`; 
            } catch (e) { 
                console.error("Geocoding error", e);
                return `${lat.toFixed(3)}, ${lon.toFixed(3)}`; 
            }
        }

        function updateTimer() {
            const diff = new Date(new Date() - startTime);
            document.getElementById('timer').innerText = diff.toISOString().substr(11, 8);
        }

        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function startTrip() {
            if (!navigator.geolocation) return alert("GPS nie je podporované.");
            
            startTime = new Date();
            totalDistance = 0;
            lastCoords = null;
            document.getElementById('distance').innerText = "0.0";
            document.getElementById('locationDisplay').innerText = "📍 Lokalizujem štart...";
            
            toggleUI(true);
            timerInterval = setInterval(updateTimer, 1000);

            navigator.geolocation.getCurrentPosition(async p => {
                startAddr = await fetchCity(p.coords.latitude, p.coords.longitude);
                document.getElementById('locationDisplay').innerText = `Odchod: ${startAddr}`;
                lastCoords = { lat: p.coords.latitude, lon: p.coords.longitude };
            }, err => {
                document.getElementById('locationDisplay').innerText = "📍 Chyba GPS signálu";
            }, { enableHighAccuracy: true });

            watchId = navigator.geolocation.watchPosition(p => {
                if (lastCoords) {
                    const d = getDist(lastCoords.lat, lastCoords.lon, p.coords.latitude, p.coords.longitude);
                    if (d > 0.008) { 
                        totalDistance += d;
                        document.getElementById('distance').innerText = totalDistance.toFixed(2);
                    }
                }
                lastCoords = { lat: p.coords.latitude, lon: p.coords.longitude };
            }, null, { enableHighAccuracy: true });
        }

        async function stopTrip() {
            clearInterval(timerInterval);
            navigator.geolocation.clearWatch(watchId);
            
            document.getElementById('locationDisplay').innerText = "📍 Lokalizujem cieľ...";
            
            if (lastCoords) {
                endAddr = await fetchCity(lastCoords.lat, lastCoords.lon);
            }

            const consumption = parseFloat(document.getElementById('avgConsumption').value) || 0;
            const price = parseFloat(document.getElementById('fuelPrice').value) || 0;
            const cost = (totalDistance * (consumption / 100) * price).toFixed(2);

            const record = {
                date: new Date().toLocaleString('sk-SK'),
                from: startAddr,
                to: endAddr,
                km: totalDistance.toFixed(2),
                time: document.getElementById('timer').innerText,
                cost: cost,
                odo: document.getElementById('odo').value || "-",
                refuel: document.getElementById('refuelLiters').value || "0"
            };

            tripHistory.push(record);
            localStorage.setItem('tripHistory', JSON.stringify(tripHistory));
            
            renderHistory();
            toggleUI(false);
            document.getElementById('locationDisplay').innerText = `Cieľ: ${endAddr}`;
            alert(`Jazda ukončená v ${endAddr}`);
        }

        function toggleUI(on) {
            document.getElementById('startBtn').classList.toggle('hidden', on);
            document.getElementById('stopBtn').classList.toggle('hidden', !on);
            const b = document.getElementById('statusBadge');
            b.innerText = on ? "V pohybe" : "Pripravený";
            b.className = on ? "text-[10px] bg-green-500/20 border border-green-500/50 px-3 py-1 rounded-full uppercase font-bold text-green-400 active-pulse" : "text-[10px] bg-slate-800 border border-slate-700 px-3 py-1 rounded-full uppercase font-bold text-slate-400";
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            container.innerHTML = '<h3 class="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] mb-4 px-1">Posledné jazdy</h3>';
            tripHistory.slice().reverse().slice(0, 10).forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50 text-[11px] mb-2";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-slate-400 font-bold">${item.date}</span>
                        <span class="bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-lg font-black">${item.km} km</span>
                    </div>
                    <div class="space-y-1 opacity-80">
                        <div class="truncate">🚩 ${item.from}</div>
                        <div class="truncate">🏁 ${item.to}</div>
                    </div>
                    <div class="mt-2 pt-2 border-t border-slate-700/50 flex justify-between text-[10px] font-bold text-slate-500 uppercase">
                        <span>⏱ ${item.time}</span>
                        <span>💶 ${item.cost} €</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function exportToCSV() {
            if (tripHistory.length === 0) return alert("História je prázdna.");
            let csv = "Datum;Z_Mesta;Do_Mesta;Vzdialenost_km;Trvanie;Naklady_EUR;Tachometer_km;Natankovane_l\n";
            tripHistory.forEach(r => {
                csv += `"${r.date}";"${r.from}";"${r.to}";${r.km};${r.time};${r.cost};${r.odo};${r.refuel}\n`;
            });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `kniha_jazd_export.csv`;
            link.click();
        }

        function clearLogs() { if(confirm("Naozaj vymazať celú históriu?")) { tripHistory = []; localStorage.removeItem('tripHistory'); renderHistory(); } }

        renderHistory();
    </script>
</body>
</html>
