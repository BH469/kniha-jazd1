<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kniha Jázd - Manuál</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #0f172a; }
        input::placeholder { color: #475569; }
    </style>
</head>
<body class="text-white font-sans min-h-screen p-4 pb-10">

    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black text-blue-400 mb-6 flex justify-between items-center">
            🚗 Kniha Jázd
            <span id="statusBadge" class="text-[10px] bg-slate-800 border border-slate-700 px-3 py-1 rounded-full uppercase text-slate-400">Pripravený</span>
        </h1>

        <!-- SEKCIA NASTAVENIA (VYPĹŇA SA PRED JAZDOU) -->
        <div id="setupSection" class="bg-slate-800/50 p-5 rounded-3xl mb-6 border border-slate-700 shadow-xl space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-2">
                    <label class="text-[10px] text-slate-500 uppercase font-bold ml-1">EČV Vozidla</label>
                    <input type="text" id="carPlate" placeholder="napr. BL123AB" class="w-full bg-slate-900 border-none rounded-xl p-3 text-white outline-none focus:ring-2 focus:ring-blue-500 uppercase">
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold ml-1">📍 Z miesta</label>
                    <input type="text" id="fromPlace" placeholder="Bratislava" class="w-full bg-slate-900 border-none rounded-xl p-3 text-white outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold ml-1">🏁 Do miesta</label>
                    <input type="text" id="toPlace" placeholder="Košice" class="w-full bg-slate-900 border-none rounded-xl p-3 text-white outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold ml-1">Stav tachometra</label>
                    <input type="number" id="startOdo" placeholder="km pri štarte" class="w-full bg-slate-900 border-none rounded-xl p-3 text-white outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] text-orange-500 uppercase font-bold ml-1">⛽ Natankované (l)</label>
                    <input type="number" id="refuel" placeholder="0" class="w-full bg-slate-900 border-none rounded-xl p-3 text-orange-400 outline-none focus:ring-2 focus:ring-orange-500">
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold ml-1">Spotreba (l/100)</label>
                    <input type="number" id="avgCons" value="6.5" step="0.1" class="w-full bg-slate-900 border-none rounded-xl p-3 text-white outline-none">
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold ml-1">Cena PHM (€/l)</label>
                    <input type="number" id="priceL" value="1.62" step="0.01" class="w-full bg-slate-900 border-none rounded-xl p-3 text-white outline-none">
                </div>
            </div>

            <button id="startBtn" onclick="startTrip()" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-95">
                ŠTART JAZDY
            </button>
        </div>

        <!-- SEKCIA JAZDY (ZOBRAZÍ SA PO ŠTARTE) -->
        <div id="driveSection" class="hidden space-y-6">
            <div class="bg-gradient-to-br from-blue-900/40 to-slate-900 p-10 rounded-[2.5rem] border border-blue-500/30 text-center shadow-2xl">
                <div id="timer" class="text-2xl font-mono text-blue-400 mb-2 tracking-widest font-bold">00:00:00</div>
                <div class="text-slate-400 text-xs uppercase tracking-widest">Jazda prebieha...</div>
                <div id="activeInfo" class="mt-4 text-sm text-slate-300 italic"></div>
            </div>

            <div class="bg-slate-800/50 p-5 rounded-3xl border border-slate-700">
                <label class="text-[10px] text-slate-500 uppercase font-bold ml-1">🏁 Cieľový stav tachometra (km)</label>
                <input type="number" id="endOdo" placeholder="Zadaj km v cieli" class="w-full bg-slate-900 border-none rounded-xl p-4 text-white text-2xl font-bold outline-none focus:ring-2 focus:ring-red-500 mb-4">
                
                <button onclick="stopTrip()" class="w-full bg-red-600 hover:bg-red-500 py-6 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">
                    STOP / ULOŽIŤ JAZDU
                </button>
            </div>
        </div>

        <!-- EXPORT A HISTÓRIA -->
        <div class="flex gap-2 mb-6">
            <button onclick="exportCSV()" class="flex-1 bg-slate-700 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">📥 Export CSV</button>
            <button onclick="clearLogs()" class="bg-slate-800 py-3 px-4 rounded-xl text-[10px] text-red-500 font-bold uppercase">Zmazať</button>
        </div>

        <div id="historyList" class="space-y-3"></div>
    </div>

    <script>
        let startTime = null, timerInterval = null;
        let tripHistory = JSON.parse(localStorage.getItem('tripHistory')) || [];

        function updateTimer() {
            const diff = new Date(new Date() - startTime);
            document.getElementById('timer').innerText = diff.toISOString().substr(11, 8);
        }

        function startTrip() {
            const plate = document.getElementById('carPlate').value;
            const from = document.getElementById('fromPlace').value;
            const startKm = document.getElementById('startOdo').value;

            if (!plate || !from || !startKm) {
                alert("Prosím vyplň EČV, Miesto štartu a Tachometer!");
                return;
            }

            startTime = new Date();
            timerInterval = setInterval(updateTimer, 1000);

            document.getElementById('setupSection').classList.add('hidden');
            document.getElementById('driveSection').classList.remove('hidden');
            document.getElementById('statusBadge').innerText = "V pohybe";
            document.getElementById('statusBadge').classList.replace('text-slate-400', 'text-green-400');
            document.getElementById('activeInfo').innerText = `${plate} | Z: ${from}`;
        }

        function stopTrip() {
            const endKm = parseFloat(document.getElementById('endOdo').value);
            const startKm = parseFloat(document.getElementById('startOdo').value);

            if (!endKm || endKm <= startKm) {
                alert("Cieľové km musia byť vyššie ako počiatočné!");
                return;
            }

            clearInterval(timerInterval);
            
            const dist = endKm - startKm;
            const cons = parseFloat(document.getElementById('avgCons').value);
            const price = parseFloat(document.getElementById('priceL').value);
            const fuelUsed = (dist * (cons / 100)).toFixed(2);
            const cost = (fuelUsed * price).toFixed(2);

            const record = {
                plate: document.getElementById('carPlate').value.toUpperCase(),
                date: new Date().toLocaleString('sk-SK'),
                from: document.getElementById('fromPlace').value,
                to: document.getElementById('toPlace').value || "Neznáme",
                startKm: startKm,
                endKm: endKm,
                dist: dist.toFixed(1),
                duration: document.getElementById('timer').innerText,
                refueled: document.getElementById('refuel').value || "0",
                fuelUsed: fuelUsed,
                cost: cost
            };

            tripHistory.push(record);
            localStorage.setItem('tripHistory', JSON.stringify(tripHistory));

            // Reset UI
            document.getElementById('driveSection').classList.add('hidden');
            document.getElementById('setupSection').classList.remove('hidden');
            document.getElementById('statusBadge').innerText = "Pripravený";
            document.getElementById('endOdo').value = "";
            document.getElementById('startOdo').value = endKm; // Predvyplníme nové km pre ďalšiu jazdu
            
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            container.innerHTML = '<h3 class="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Posledné záznamy</h3>';
            tripHistory.slice().reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50 text-[11px] mb-2";
                div.innerHTML = `
                    <div class="flex justify-between font-bold text-blue-400 mb-1">
                        <span>${item.plate} | ${item.date}</span>
                        <span>${item.dist} km</span>
                    </div>
                    <div class="text-slate-300">Z: ${item.from} → Do: ${item.to}</div>
                    <div class="flex justify-between mt-2 text-[10px] text-slate-500 font-bold uppercase">
                        <span>Odo: ${item.startKm}-${item.endKm}</span>
                        <span>Spotreba: ${item.fuelUsed}l (${item.cost}€)</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function exportCSV() {
            if (tripHistory.length === 0) return;
            let csv = "ECV;Datum;Z;Do;Start_KM;Koniec_KM;Vzdialenost;Trvanie;Natankovane_L;Spotrebovane_L;Naklady_EUR\n";
            tripHistory.forEach(r => {
                csv += `"${r.plate}";"${r.date}";"${r.from}";"${r.to}";${r.startKm};${r.endKm};${r.dist};${r.duration};${r.refueled};${r.fuelUsed};${r.cost}\n`;
            });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `kniha_jazd_${document.getElementById('carPlate').value}.csv`;
            link.click();
        }

        function clearLogs() { if(confirm("Zmazať všetko?")) { tripHistory = []; localStorage.removeItem('tripHistory'); renderHistory(); } }

        renderHistory();
    </script>
</body>
</html>
